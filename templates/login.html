<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Bootstrap 4 CSS -->
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9aIt2L4A0v0f3b5t9tE91LOn+edpJ9aSbti+z0M6g7VSqqPbiTfKkKvF8ohC/mot" crossorigin="anonymous">

<!-- Bootstrap 4 JS and Popper.js (for Bootstrap components like modals, dropdowns, etc.) -->

    <title>Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
        }

        body {
            background-color: #f8fafc;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #334155;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
        }

        .login-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            border: 1px solid #e2e8f0;
            animation: fadeIn 0.5s ease-out;
        }

        .login-header {
            background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
            padding: 40px 30px;
            text-align: center;
            border-bottom: 1px solid #e2e8f0;
        }

        .login-header h1 {
            font-size: 28px;
            margin-bottom: 8px;
            font-weight: 700;
            color: #1e293b;
        }

        .login-header p {
            color: #64748b;
            font-size: 15px;
            opacity: 0.9;
        }

        .login-header .logo {
            font-size: 36px;
            color: #3b82f6;
            margin-bottom: 15px;
        }

        .login-form {
            padding: 40px 35px;
        }

        .form-group {
            margin-bottom: 24px;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #475569;
            font-weight: 500;
            font-size: 14px;
        }

        .input-with-icon {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 18px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 14px 14px 14px 48px;
            border: 1.5px solid #cbd5e1;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.2s ease;
            background: white;
            color: #334155;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #3b82f6;
            background: white;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        input[type="text"]::placeholder,
        input[type="password"]::placeholder {
            color: #94a3b8;
        }

        .show-password {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #64748b;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            padding: 4px 8px;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .show-password:hover {
            color: #3b82f6;
            background-color: #f1f5f9;
        }

        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #475569;
            cursor: pointer;
        }

        .remember-me input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #3b82f6;
            cursor: pointer;
        }

        .forgot-password {
            color: #3b82f6;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .forgot-password:hover {
            color: #2563eb;
            text-decoration: underline;
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(to right, #3b82f6, #6366f1);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            box-shadow: 0 2px 10px rgba(59, 130, 246, 0.2);
        }

        .login-btn:hover {
            background: linear-gradient(to right, #2563eb, #4f46e5);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }

        .login-btn i {
            font-size: 16px;
        }

        .separator {
            text-align: center;
            margin: 30px 0;
            position: relative;
            color: #94a3b8;
            font-size: 14px;
        }

        .separator::before,
        .separator::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 45%;
            height: 1px;
            background: #e2e8f0;
        }

        .separator::before {
            left: 0;
        }

        .separator::after {
            right: 0;
        }

        .register-link {
            text-align: center;
            margin-top: 25px;
            color: #64748b;
            font-size: 15px;
        }

        .register-link a {
            color: #3b82f6;
            text-decoration: none;
            font-weight: 600;
            margin-left: 5px;
            transition: color 0.2s;
        }

        .register-link a:hover {
            color: #2563eb;
            text-decoration: underline;
        }

        .error-message {
            color: #dc2626;
            font-size: 13px;
            margin-top: 6px;
            display: none;
            padding: 8px 12px;
            border-radius: 6px;
            background-color: #fef2f2;
            border-left: 3px solid #dc2626;
        }

        .success-message {
            color: #059669;
            font-size: 13px;
            margin-top: 6px;
            display: none;
            padding: 8px 12px;
            border-radius: 6px;
            background-color: #f0fdf4;
            border-left: 3px solid #059669;
        }

        .demo-note {
            background-color: #f0f9ff;
            border: 1px solid #bae6fd;
            border-radius: 8px;
            padding: 12px 16px;
            margin-top: 20px;
            font-size: 13px;
            color: #0369a1;
        }

        .demo-note strong {
            color: #075985;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .shake {
            animation: shake 0.3s ease-in-out;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .fa-spin {
            animation: spin 1s linear infinite;
        }

        @media (max-width: 480px) {
            .login-card {
                border-radius: 12px;
            }
            
            .login-form {
                padding: 30px 25px;
            }
            
            .login-header {
                padding: 30px 25px;
            }
            
            .remember-forgot {
                flex-direction: column;
                gap: 15px;
                align-items: flex-start;
            }
            
            .forgot-password {
                align-self: flex-start;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo">
                    <i class="fas fa-user-circle"></i>
                </div>
                <h1>Welcome Back</h1>
                <p>Sign in to continue to your account</p>
                {% if messages %}
                {% for message in messages %}
                <p>{{message}}</p>
                {% endfor %}
                {% endif %}
            </div>

            <form action="{% url 'user_login' %}" method="post" class="login-form" id="loginForm">
                {% csrf_token %}
                <div class="form-group">
                    <label for="username">Username or Email</label>
                    <div class="input-with-icon">
                        <i class="fas fa-user input-icon"></i>
                        <input type="text" id="username" name="username" 
                               placeholder="Enter username or email" required>
                    </div>
                    <div class="error-message" id="usernameError"></div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-with-icon">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="password" name="password" 
                               placeholder="Enter your password" required>
                        <button type="button" class="show-password" id="togglePassword">
                            Show
                        </button>
                    </div>
                    <div class="error-message" id="passwordError"></div>
                </div>

                <div class="remember-forgot">
                    <label class="remember-me">
                        <input type="checkbox" id="rememberMe" name="rememberMe">
                        Remember me
                    </label>
                </div>

                <button type="submit" class="login-btn" id="submitBtn">
                    <i class="fas fa-sign-in-alt"></i>
                    Sign In
                </button>

                <div class="separator">New to our platform?</div>

                <div class="register-link">
                    Don't have an account?
                    <a href="{% url 'user_register' %}">Sign up here</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const loginForm = document.getElementById('loginForm');
            const togglePassword = document.getElementById('togglePassword');
            const passwordInput = document.getElementById('password');
            const submitBtn = document.getElementById('submitBtn');
            
            // Toggle password visibility
            togglePassword.addEventListener('click', function() {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                this.textContent = type === 'password' ? 'Show' : 'Hide';
            });
            
            // Form submission
            loginForm.addEventListener('submit', function(e) {
                // e.preventDefault();
                
                // Clear previous messages
                clearMessages();
                
                // Get form values
                const username = document.getElementById('username').value.trim();
                const password = passwordInput.value;
                const rememberMe = document.getElementById('rememberMe').checked;
                
                let isValid = true;
                
                // Username validation
                if (username.length < 3) {
                    showError('usernameError', 'Please enter a valid username or email');
                    isValid = false;
                }
                
                // Password validation
                if (password.length < 6) {
                    showError('passwordError', 'Password must be at least 6 characters');
                    isValid = false;
                }
                
                if (isValid) {
                    // Process login
                    processLogin(username, password, rememberMe);
                } else {
                    // Add shake animation to form
                    loginForm.classList.add('shake');
                    setTimeout(() => {
                        loginForm.classList.remove('shake');
                    }, 300);
                }
            });
            
            function processLogin(username, password, rememberMe) {
                // Show loading state
                const originalText = submitBtn.innerHTML;
                submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing In...';
                submitBtn.disabled = true;
                
                // Simulate API call delay
                setTimeout(() => {
                    // Demo authentication logic
                    if ((username === 'demo' || username === 'user@example.com') && password === 'password123') {
                        showSuccess('Login successful! Redirecting to dashboard...');
                        
                        // Handle remember me
                        if (rememberMe) {
                            localStorage.setItem('rememberedUser', username);
                        } else {
                            localStorage.removeItem('rememberedUser');
                        }
                        
                        // Simulate redirect (in real app, this would redirect to dashboard)
                        setTimeout(() => {
                            // For demo, just show an alert
                            alert('Login successful! Welcome, ' + username + '. In a real application, you would be redirected to the dashboard.');
                            loginForm.reset();
                        }, 1500);
                    } else {
                        showError('usernameError', 'Invalid username or password. Try: demo / password123');
                    }
                    
                    // Reset button
                    submitBtn.innerHTML = originalText;
                    submitBtn.disabled = false;
                }, 1500);
            }
            
            function showError(elementId, message) {
                const element = document.getElementById(elementId);
                element.textContent = message;
                element.style.display = 'block';
            }
            
            function showSuccess(message) {
                // Remove any existing success message
                let successMsg = document.getElementById('successMessage');
                if (!successMsg) {
                    successMsg = document.createElement('div');
                    successMsg.id = 'successMessage';
                    successMsg.className = 'success-message';
                    loginForm.insertBefore(successMsg, loginForm.querySelector('.form-group'));
                }
                successMsg.textContent = message;
                successMsg.style.display = 'block';
                
                // Auto-hide success message after 3 seconds
                setTimeout(() => {
                    successMsg.style.display = 'none';
                }, 3000);
            }
            
            function clearMessages() {
                const errorElements = document.querySelectorAll('.error-message');
                errorElements.forEach(el => {
                    el.style.display = 'none';
                });
                
                const successMsg = document.getElementById('successMessage');
                if (successMsg) {
                    successMsg.style.display = 'none';
                }
            }
            
            // Auto-fill if user is remembered
            const rememberedUser = localStorage.getItem('rememberedUser');
            if (rememberedUser) {
                document.getElementById('username').value = rememberedUser;
                document.getElementById('rememberMe').checked = true;
            }
            
            // Auto-fill demo credentials on double-click of card
            loginForm.addEventListener('dblclick', function(e) {
                if (e.target.closest('.login-card')) {
                    document.getElementById('username').value = 'demo';
                    passwordInput.value = 'password123';
                    document.getElementById('rememberMe').checked = true;
                    showSuccess('Demo credentials filled. Click "Sign In" to login.');
                }
            });
            
            // Add some interactive effects to inputs
            const inputs = document.querySelectorAll('input[type="text"], input[type="password"]');
            inputs.forEach(input => {
                // Add focus effect
                input.addEventListener('focus', function() {
                    this.parentElement.querySelector('.input-icon').style.color = '#3b82f6';
                });
                
                input.addEventListener('blur', function() {
                    this.parentElement.querySelector('.input-icon').style.color = '#94a3b8';
                });
            });
        });
    </script>
</body>
</html>
